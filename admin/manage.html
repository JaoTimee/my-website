<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair System - จัดการผู้ใช้</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
        }
        .sidebar-bg {
            background-color: #21325b;
        }
        /* ซ่อน Scrollbar ของเมนูเพื่อความสวยงามบนมือถือ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Custom Scrollbar สำหรับตาราง */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden text-gray-800 relative">

    <div class="md:hidden sidebar-bg text-white p-4 flex items-center z-30 relative shadow-md shrink-0">
        <button id="mobileMenuBtn" class="focus:outline-none hover:bg-white/10 p-2 mr-3 rounded-lg transition-colors">
            <i class="fa-solid fa-bars text-2xl"></i>
        </button>
        <h1 class="text-xl font-bold tracking-wider whitespace-nowrap">Repair System</h1>
    </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity opacity-0 duration-300 md:hidden"></div>

    <aside id="sidebar" class="sidebar-bg w-64 flex-shrink-0 flex flex-col text-white transition-all duration-300 fixed md:relative z-50 h-full transform -translate-x-full md:translate-x-0">
        <div class="p-6 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider whitespace-nowrap">Repair System</h1>
            <button id="closeMenuBtn" class="text-gray-300 hover:text-white p-1 md:hidden transition-colors focus:outline-none ml-2 shrink-0">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-2 md:mt-4 overflow-y-auto no-scrollbar">
            <a href="home.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-house w-6 text-center"></i>
                <span class="ml-3 font-medium">Dashboard</span>
            </a>
            <a href="register_equipment.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-gear w-6 text-center"></i>
                <span class="ml-3">ลงทะเบียนอุปกรณ์</span>
            </a>
            <a href="device_registration.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-computer w-6 text-center"></i>
                <span class="ml-3">ทะเบียนอุปกรณ์</span>
            </a>
            <a href="report_repair.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-wrench w-6 text-center"></i>
                <span class="ml-3">แจ้งซ่อม</span>
            </a>
            <a href="#" class="flex items-center px-4 py-3 bg-blue-600 rounded-lg text-white shadow-md">
                <i class="fa-solid fa-user w-6 text-center"></i>
                <span class="ml-3 font-medium">จัดการผู้ใช้</span>
            </a>
            <a href="list_work.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-list w-6 text-center"></i>
                <span class="ml-3">รายการงาน</span>
            </a>
            <a href="history.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-clock-rotate-left w-6 text-center"></i>
                <span class="ml-3">ประวัติการทำงาน</span>
            </a>
        </nav>
        
        <div class="p-4 mb-4">
            <a href="../index.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket w-6 text-center"></i>
                <span class="ml-3">ออกจากระบบ</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto relative w-full">
        <div class="p-4 sm:p-6 md:p-8 max-w-7xl mx-auto w-full">
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-3 sm:gap-4">
                <h2 class="text-xl md:text-2xl font-bold text-[#1e2b4d]">จัดการผู้ใช้</h2>
                <div class="text-xs md:text-sm font-semibold text-gray-700 bg-white px-3 md:px-4 py-2 rounded-lg shadow-sm border border-gray-100 self-start sm:self-auto">
                    ผู้ใช้ทั้งหมด : <span id="totalUsersCount" class="text-blue-600">0 คน</span>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6 flex flex-col md:flex-row gap-3 md:gap-4">
                <div class="flex-1 relative">
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อผู้ใช้" class="w-full border border-gray-300 rounded-lg py-2.5 px-4 text-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                </div>
                
                <div class="relative w-full md:w-64">
                    <select id="roleFilter" class="w-full appearance-none border border-gray-300 rounded-lg py-2.5 px-4 pr-10 text-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 cursor-pointer transition-colors bg-white">
                        <option value="">ทุกหน้าที่</option>
                        <option value="ผู้ใช้">ผู้ใช้</option>
                        <option value="เจ้าหน้าที่ช่าง">เจ้าหน้าที่ช่าง</option>
                        <option value="SUPER ADMIN">SUPER ADMIN</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fa-solid fa-caret-down text-sm"></i>
                    </div>
                </div>

                <button onclick="openModal()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm whitespace-nowrap active:scale-95 flex items-center justify-center">
                    <i class="fa-solid fa-plus mr-1.5"></i> เพิ่มผู้ใช้
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                <div class="overflow-x-auto min-h-[400px] custom-scrollbar p-2">
                    <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                        <thead>
                            <tr class="text-gray-800 font-bold border-b border-gray-200 bg-white">
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[20%]">ชื่อ-นามสกุล</th>
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[15%]">Username</th>
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[20%] text-center">หน่วยงาน</th>
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[15%] text-center">หน้าที่</th>
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[10%] text-center">สถานะ</th>
                                <th class="py-3 md:py-4 px-4 md:px-6 w-[20%] text-center">การจัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="text-gray-600 divide-y divide-gray-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="userModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-2xl transition-all w-full max-w-lg">
                
                <div class="flex items-center justify-between p-5 md:p-6 pb-2">
                    <h3 id="modalTitle" class="text-lg md:text-xl font-bold text-center w-full text-gray-800">เพิ่มผู้ใช้</h3>
                    <button type="button" onclick="closeModal()" class="absolute right-4 top-4 md:right-5 md:top-5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-full w-8 h-8 flex items-center justify-center transition-colors">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>

                <form id="userForm" onsubmit="saveUser(event)">
                    <div class="p-5 md:p-6 pt-4 space-y-4 md:space-y-5">
                        
                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">ชื่อ-นามสกุล</label>
                            <input type="text" id="inputName" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                        </div>

                        <div>
                            <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">Username</label>
                            <input type="text" id="inputUsername" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="relative">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">เลือกหน้าที่</label>
                                <select id="inputRole" required class="w-full appearance-none border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 cursor-pointer">
                                    <option value="" disabled selected>เลือกหน้าที่</option>
                                    <option value="ผู้ใช้">ผู้ใช้</option>
                                    <option value="เจ้าหน้าที่ช่าง">เจ้าหน้าที่ช่าง</option>
                                    <option value="SUPER ADMIN">SUPER ADMIN</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 pt-6 text-gray-500">
                                    <i class="fa-solid fa-caret-down text-sm"></i>
                                </div>
                            </div>

                            <div class="relative">
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">เลือกสำนักงาน</label>
                                <select id="inputOffice" required class="w-full appearance-none border border-gray-300 rounded-lg px-4 py-2.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 cursor-pointer">
                                    <option value="" disabled selected>เลือกสำนักงาน</option>
                                    <option value="กองสวัสดิการ">กองสวัสดิการ</option>
                                    <option value="สำนักปลัด">สำนักปลัด</option>
                                    <option value="กองคลัง">กองคลัง</option>
                                    <option value="กองช่าง">กองช่าง</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 pt-6 text-gray-500">
                                    <i class="fa-solid fa-caret-down text-sm"></i>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">รหัสผ่าน <span id="pwdLabel" class="text-gray-400 text-xs font-normal"></span></label>
                                <input type="password" id="inputPassword" placeholder="รหัสผ่าน" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs md:text-sm font-medium text-gray-700 mb-1.5">ยืนยันรหัสผ่าน</label>
                                <input type="password" id="inputConfirmPassword" placeholder="ยืนยันรหัสผ่าน" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                            </div>
                        </div>
                    </div>

                    <div class="p-5 md:p-6 pt-2 flex gap-3 md:gap-4">
                        <button type="button" onclick="closeModal()" class="w-1/2 bg-[#b2b2b2] hover:bg-gray-400 text-white text-sm md:text-base font-medium py-2.5 rounded-lg transition-colors">
                            ยกเลิก
                        </button>
                        <button type="submit" class="w-1/2 bg-[#2563eb] hover:bg-blue-700 text-white text-sm md:text-base font-medium py-2.5 rounded-lg transition-colors shadow-md active:scale-95">
                            บันทึก
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script>
        // --------------------------------------------------------
        // JavaScript สำหรับเปิด-ปิดเมนูด้านข้าง (Sidebar) บนหน้าจอมือถือ
        // --------------------------------------------------------
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
                setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('opacity-0');
                setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
            }
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        closeMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --------------------------------------------------------
        // โค้ดเดิม (ระบบตารางและการจัดการข้อมูลผู้ใช้)
        // --------------------------------------------------------
        
        // ข้อมูลจำลองตั้งต้น
        let users = [
            { id: 1, name: 'สมชาย รักดี', username: 'somchai', office: 'กองสวัสดิการ', role: 'ผู้ใช้', status: 'ใช้งาน' },
            { id: 2, name: 'ชายน้อย ใจสู้', username: 'chainoi', office: 'กองช่าง', role: 'เจ้าหน้าที่ช่าง', status: 'ใช้งาน' },
            { id: 3, name: 'ชายใหญ่ ทรงพลัง', username: 'chaiyai', office: 'สำนักปลัด', role: 'SUPER ADMIN', status: 'ใช้งาน' }
        ];

        let editingId = null; // ตัวแปรเช็คว่ากำลังแก้ไขใครอยู่ (null = เพิ่มใหม่)

        // ฟังก์ชันค้นหาและกรองข้อมูล
        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('roleFilter').addEventListener('change', renderTable);

        // ฟังก์ชันวาดตาราง
        function renderTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = ''; 

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const roleFilter = document.getElementById('roleFilter').value;

            let filteredUsers = users.filter(user => {
                const matchSearch = user.name.toLowerCase().includes(searchTerm) || user.username.toLowerCase().includes(searchTerm);
                const matchRole = roleFilter === '' || user.role === roleFilter;
                return matchSearch && matchRole;
            });

            filteredUsers.forEach(user => {
                const statusColor = user.status === 'ใช้งาน' ? 'bg-[#10b981]' : 'bg-[#a8a29e]';
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition-colors border-b border-gray-50';
                tr.innerHTML = `
                    <td class="py-3 md:py-4 px-4 md:px-6 font-medium whitespace-nowrap">${user.name}</td>
                    <td class="py-3 md:py-4 px-4 md:px-6 whitespace-nowrap">${user.username}</td>
                    <td class="py-3 md:py-4 px-4 md:px-6 text-center whitespace-nowrap">${user.office}</td>
                    <td class="py-3 md:py-4 px-4 md:px-6 text-center whitespace-nowrap">${user.role}</td>
                    <td class="py-3 md:py-4 px-4 md:px-6 text-center whitespace-nowrap">
                        <span class="${statusColor} text-white px-3 md:px-5 py-1 md:py-1.5 rounded-md text-[10px] md:text-xs font-medium inline-block w-20 cursor-pointer transition-colors" onclick="toggleStatus(${user.id})">${user.status}</span>
                    </td>
                    <td class="py-3 md:py-4 px-4 md:px-6 text-center flex justify-center gap-1.5 md:gap-2 whitespace-nowrap">
                        <button onclick="openModal(${user.id})" class="bg-[#3b82f6] hover:bg-blue-700 text-white px-3 md:px-4 py-1.5 rounded-md text-[10px] md:text-xs font-medium transition-colors w-16 md:w-20">แก้ไข</button>
                        <button onclick="deleteUser(${user.id})" class="bg-red-500 hover:bg-red-600 text-white px-3 md:px-4 py-1.5 rounded-md text-[10px] md:text-xs font-medium transition-colors w-16 md:w-20">ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // อัปเดตตัวเลขยอดรวม
            document.getElementById('totalUsersCount').innerText = `${filteredUsers.length} คน`;
        }

        // เปิด Modal (ใช้ได้ทั้ง เพิ่ม และ แก้ไข)
        function openModal(id = null) {
            const modal = document.getElementById('userModal');
            const title = document.getElementById('modalTitle');
            const pwdLabel = document.getElementById('pwdLabel');
            
            editingId = id; 

            if (editingId) {
                const user = users.find(u => u.id === editingId);
                title.innerText = 'แก้ไขผู้ใช้';
                document.getElementById('inputName').value = user.name;
                document.getElementById('inputUsername').value = user.username;
                document.getElementById('inputRole').value = user.role;
                document.getElementById('inputOffice').value = user.office;
                
                document.getElementById('inputPassword').required = false;
                document.getElementById('inputConfirmPassword').required = false;
                pwdLabel.innerText = '(ปล่อยว่างหากไม่ต้องการเปลี่ยน)';
            } else {
                title.innerText = 'เพิ่มผู้ใช้';
                document.getElementById('userForm').reset();
                
                document.getElementById('inputPassword').required = true;
                document.getElementById('inputConfirmPassword').required = true;
                pwdLabel.innerText = '';
            }

            modal.classList.remove('hidden');
        }

        // ปิด Modal
        function closeModal() {
            document.getElementById('userModal').classList.add('hidden');
            document.getElementById('userForm').reset();
            editingId = null;
        }

        // บันทึกข้อมูล
        function saveUser(event) {
            event.preventDefault(); 

            const name = document.getElementById('inputName').value;
            const username = document.getElementById('inputUsername').value;
            const role = document.getElementById('inputRole').value;
            const office = document.getElementById('inputOffice').value;
            const pwd1 = document.getElementById('inputPassword').value;
            const pwd2 = document.getElementById('inputConfirmPassword').value;

            if (pwd1 !== pwd2) {
                alert('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน!');
                return;
            }

            if (editingId) {
                const index = users.findIndex(u => u.id === editingId);
                users[index].name = name;
                users[index].username = username;
                users[index].role = role;
                users[index].office = office;
                alert('อัปเดตข้อมูลสำเร็จ!');
            } else {
                const newUser = {
                    id: Date.now(),
                    name: name,
                    username: username,
                    role: role,
                    office: office,
                    status: 'ใช้งาน'
                };
                users.push(newUser);
                alert('เพิ่มผู้ใช้สำเร็จ!');
            }

            renderTable();
            closeModal();
        }

        // ฟังก์ชันลบผู้ใช้
        function deleteUser(id) {
            if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบผู้ใช้นี้?')) {
                users = users.filter(u => u.id !== id);
                renderTable();
            }
        }

        // เปลี่ยนสถานะ ใช้งาน/ปิดใช้งาน
        function toggleStatus(id) {
            const index = users.findIndex(u => u.id === id);
            users[index].status = users[index].status === 'ใช้งาน' ? 'ปิดใช้งาน' : 'ใช้งาน';
            renderTable();
        }

        // วาดตารางครั้งแรกตอนเปิดหน้าเว็บ
        renderTable();
    </script>
</body>
</html>
