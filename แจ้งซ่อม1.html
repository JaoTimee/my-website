<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งซ่อมคอมพิวเตอร์ - Repair System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f1f5f9;
        }
        .sidebar-bg {
            background-color: #21325b;
        }
        .desk-selected {
            border-color: #2563eb !important;
            background-color: #eff6ff !important;
            color: #1e40af !important;
        }
        input:invalid, select:invalid {
            border-color: #f87171;
        }
        select {
            background-image: none !important;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800">

    <aside class="sidebar-bg w-64 flex-shrink-0 flex flex-col text-white transition-all duration-300">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-wider">Repair System</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="home.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-house w-6 text-center"></i>
                <span class="ml-3 font-medium">Dashboard</span>
            </a>
            <a href="ลงทะเบียนอุปกรณ์.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-gear w-6 text-center"></i>
                <span class="ml-3">ลงทะเบียนอุปกรณ์</span>
            </a>
            <a href="แจ้งซ่อม1.html" class="flex items-center px-4 py-3 bg-blue-600 rounded-lg text-white shadow-lg shadow-blue-900/20">
                <i class="fa-solid fa-wrench w-6 text-center"></i>
                <span class="ml-3 font-medium">แจ้งซ่อม</span>
            </a>
            <a href="ประวัติการแจ้ง.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-list w-6 text-center"></i>
                <span class="ml-3">ประวัติการแจ้ง</span>
            </a>
        </nav>
        
        <div class="p-4 mb-4">
            <a href="login.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-white/10 rounded-lg transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket w-6 text-center"></i>
                <span class="ml-3">ออกจากระบบ</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto p-8">
        <div class="max-w-[1400px] mx-auto w-full transition-all duration-500">
            
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-gray-800">แจ้งซ่อมคอมพิวเตอร์</h2>
                <p class="text-base text-gray-500 mt-2">กรอกข้อมูลเพื่อส่งคำร้องซ่อม</p>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-12">
                <form id="repairForm" action="#" method="POST" class="space-y-10">
                    
                    <div class="space-y-8">
                        <span class="block text-sm font-semibold text-slate-500">*กรอกข้อมูลรายละเอียด</span>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                            
                            

                            <div class="relative">
                                <label class="block text-sm font-semibold text-slate-700 mb-3">กอง / สำนัก</label>
                                <select id="division" name="division" class="w-full border border-slate-200 rounded-xl px-5 py-3.5 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 bg-white appearance-none cursor-pointer transition-all" required onchange="handleDivisionChange()">
                                    <option value="" disabled selected>เลือกกอง/สำนัก</option>
                                    <option value="สำนักปลัด">สำนักปลัด</option>
                                    <option value="สำนักงานเลขานุการฯ">สำนักงานเลขานุการฯ</option>
                                    <option value="สำนักคลัง">สำนักคลัง</option>
                                    <option value="สำนักช่าง">สำนักช่าง</option>
                                    <option value="กองสาธารณสุข">กองสาธารณสุข</option>
                                    <option value="กองยุทธศาสตร์และงบประมาณ">กองยุทธศาสตร์และงบประมาณ</option>
                                    <option value="สำนักการศึกษา ศาสนาและวัฒนธรรม">สำนักการศึกษา ศาสนาและวัฒนธรรม</option>
                                    <option value="กองสวัสดิการสังคม">กองสวัสดิการสังคม</option>
                                    <option value="หน่วยตรวจสอบภายใน">หน่วยตรวจสอบภายใน</option>
                                    <option value="กองการเจ้าหน้าที่">กองการเจ้าหน้าที่</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 pt-8 text-slate-400">
                                    <i class="fa-solid fa-chevron-down text-sm"></i>
                                </div>
                            </div>

                            <div class="relative">
                                <label class="block text-sm font-semibold text-slate-700 mb-3">ฝ่าย</label>
                                <select id="subdivision" name="subdivision" class="w-full border border-slate-200 rounded-xl px-5 py-3.5 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 bg-white appearance-none cursor-pointer transition-all" required disabled>
                                    <option value="">กรุณาเลือกกองก่อน</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 pt-8 text-slate-400">
                                    <i class="fa-solid fa-chevron-down text-sm"></i>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">จัดซื้อมาจาก</label>
                                <input type="text" placeholder="กรอกที่อยู่จัดซื้อ" class="w-full border border-slate-200 rounded-xl px-5 py-3.5 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-3">วันที่จัดซื้อ</label>
                                <input type="date" class="w-full border border-gray-200 rounded-xl px-5 py-3 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required>
                            </div>
                            <div class="relative">
                                <label class="block text-sm font-semibold text-slate-700 mb-3">ประเภทอุปกรณ์</label>
                                <select id="device_type" name="device_type" class="w-full border border-slate-200 rounded-xl px-5 py-3.5 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 bg-white appearance-none cursor-pointer transition-all" required onchange="handleDeviceChange()">
                                    <option value="" disabled selected>เลือกประเภทอุปกรณ์</option>
                                    <option value="คอมพิวเตอร์">คอมพิวเตอร์ (PC)</option>
                                    <option value="Notebook">Notebook</option>
                                    <option value="Printer">Printer</option>
                                    <option value="Printer">โปรแกรม</option>
                                    <option value="Printer">เครื่องแสกน</option>
                                    <option value="Printer">เครื่องปริ้น</option>
                                    <option value="Printer">เครื่องฉายโปรเจกเตอร์</option>
                                    <option value="อื่นๆ">อื่นๆ</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 pt-8 text-slate-400">
                                    <i class="fa-solid fa-chevron-down text-sm"></i>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-3">เลขครุภัณฑ์</label>
                                <input type="text" placeholder="กรอกเลขครุภัณฑ์" class="w-full border border-slate-200 rounded-xl px-5 py-3.5 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-3">วันที่แจ้งซ่อม</label>
                                <input type="date" class="w-full border border-gray-200 rounded-xl px-5 py-3 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-3">ระยะเวลารับประกันถึง</label>
                                <input type="date" class="w-full border border-gray-200 rounded-xl px-5 py-3 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required>
                            </div>

                            
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                        <div class="lg:col-span-2">
                            <label class="block text-sm font-semibold text-slate-700 mb-3">รายละเอียดปัญหา</label>
                            <textarea rows="5" placeholder="ระบุอาการเสียเบื้องต้น..." class="w-full border border-slate-200 rounded-2xl px-5 py-4 text-base focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all" required></textarea>
                        </div>
                        <div class="flex flex-col justify-end gap-4">
                            <div class="p-5 bg-blue-50 rounded-2xl border border-blue-100">
                                <h4 class="font-bold text-blue-900 mb-1">ตำแหน่งโต๊ะ</h4>
                                <p class="text-sm text-blue-600 mb-4" id="selectedDeskText">ยังไม่ได้ระบุตำแหน่ง</p>
                                <input type="hidden" name="desk_number" id="deskIdInput" required>
                                <button type="button" onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-base font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                                    <i class="fa-solid fa-desktop"></i>
                                    เลือกผังโต๊ะคอม
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-5 pt-10 border-t border-slate-50">
                        <button type="reset" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-base font-semibold py-3.5 px-10 rounded-xl transition-all">
                            ล้างข้อมูล
                        </button>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-base font-semibold py-3.5 px-10 rounded-xl transition-all shadow-xl shadow-blue-600/20 active:scale-95">
                            ส่งคำร้อง
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="floorPlanModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"></div>
        <div class="flex min-h-full items-center justify-center p-6">
            <div class="relative transform overflow-hidden rounded-3xl bg-white p-10 text-left shadow-2xl transition-all w-full max-w-2xl">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-2xl font-bold text-slate-800">เลือกตำแหน่งที่ตั้งโต๊ะ</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-solid fa-circle-xmark text-2xl"></i>
                    </button>
                </div>
                <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-10">
                    <div id="deskContainer" class="grid grid-cols-4 gap-4"></div>
                </div>
                <div class="mt-8 flex justify-end">
                    <button onclick="confirmSelection()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20">
                        ยืนยันตำแหน่ง
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('floorPlanModal');
        const deskContainer = document.getElementById('deskContainer');
        const selectedText = document.getElementById('selectedDeskText');
        const deskIdInput = document.getElementById('deskIdInput');
        
        const windowsField = document.getElementById('windowsField');
        const antivirusField = document.getElementById('antivirusField');
        const windowsInput = document.getElementById('windowsInput');
        const antivirusInput = document.getElementById('antivirusInput');
        
        const subData = {
            "สำนักปลัด": ["ฝ่ายอำนวยการ", "ฝ่ายนิติการ", "ฝ่ายส่งเสริมการท่องเที่ยว", "ฝ่ายประสานงานองค์กรปกครองส่วนท้องถิ่น", "ฝ่ายป้องกันและบรรเทาสาธารณภัย", "งานหน้าห้องปลัดองค์การบริหารส่วนจังหวัด"],
            "สำนักงานเลขานุการฯ": ["ฝ่ายกิจการสภา", "ฝ่ายการประชุม", "ฝ่ายส่งเสริมการมีส่วนร่วมของประชาชน"],
            "สำนักคลัง": ["ฝ่ายบริหารงานทั่วไป", "ฝ่ายการเงิน", "ฝ่ายบัญชี", "ฝ่ายพัฒนารายได้", "ฝ่ายบำเหน็จบำนาญ", "ฝ่ายจัดหาพัสดุ", "ฝ่ายทะเบียนทรัพย์สิน", "ฝ่ายบริหารสัญญา"],
            "สำนักช่าง": ["ฝ่ายบริหารงานทั่วไป สำนักช่าง", "ฝ่ายสำรวจ", "ฝ่ายออกแบบ", "ฝ่ายวิศวกรรมโยธา", "ฝ่ายก่อสร้างและซ่อมบำรุง", "ฝ่ายควบคุมการก่อสร้าง", "กลุ่มงานกำจัดมูลฝอยเเละสิ่งปฏิกูล", "ฝ่ายจัดการคุณภาพน้ำ", "ฝ่ายสาธารณูปโภค", "ฝ่ายเครื่องจักรกล"],
            "กองสาธารณสุข": ["ฝ่ายบริหารงานทั่วไป กองสาธารณสุข", "ฝ่ายบริหารงานสาธารณสุข", "ฝ่ายบริการสาธารณสุข", "ฝ่ายส่งเสริมสาธารณสุข", "ฝ่ายป้องกันและควบคุมโรค", "กลุ่มโรงพยาบาลและหน่วยบริการสาธารณสุข"],
            "กองยุทธศาสตร์และงบประมาณ": ["ฝ่ายวิเคราะห์นโยบายและแผน", "ฝ่ายงบประมาณ", "ฝ่ายตรวจติดตามและประเมินผล", "ฝ่ายสถิติข้อมูลและสารสนเทศ", "ฝ่ายประชาสัมพันธ์"],
            "สำนักการศึกษา ศาสนาและวัฒนธรรม": ["ฝ่ายบริหารงานทั่วไป", "ฝ่ายส่งเสริมคุณภาพการศึกษา", "ฝ่ายวิชาการ", "ฝ่ายการศึกษาในระบบ", "ฝ่ายการศึกษานอกระบบและตามอัธยาศัย", "ฝ่ายส่งเสริมศาสนา", "ฝ่ายส่งเสริมกีฬาและนันทนาการ", "ฝ่ายแผนงานและโครงการ", "หน่วยงานศึกษานิเทศก์"],
            "กองสวัสดิการสังคม": ["ฝ่ายสังคมสงเคราะห์", "ฝ่ายส่งเสริมสวัสดิการสังคม", "ฝ่ายบริหารงานทั่วไป", "ฝ่ายส่งเสริมและพัฒนาอาชีพ", "ฝ่ายสถานสงเคราะห์"],
            "หน่วยตรวจสอบภายใน": ["งานมาตรฐานการควบคุมภายใน", "งานตรวจสอบการดำเนินงาน", "งานบริหารและติดตามการดำเนินงาน"],
            "กองการเจ้าหน้าที่": ["ฝ่ายสรรหาและบรรจุแต่งตั้ง", "ฝ่ายวินัยและส่งเสริมคุณธรรม", "ฝ่ายบุคลากรทางการศึกษา", "ฝ่ายสรรหาและเลือกสรร", "ฝ่ายบริหารงานทั่วไป กองการเจ้าหน้าที่"],
        };

        // ฟังก์ชันเมื่อเปลี่ยน กอง
        function handleDivisionChange() {
            const division = document.getElementById('division').value;
            const subdivision = document.getElementById('subdivision');
            
            subdivision.innerHTML = '<option value="">เลือกฝ่าย</option>';
            subdivision.disabled = false;

            if (subData[division]) {
                subData[division].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item;
                    opt.innerHTML = item;
                    subdivision.appendChild(opt);
                });
            } else {
                let opt = document.createElement('option');
                opt.value = "ฝ่ายทั่วไป";
                opt.innerHTML = "ฝ่ายทั่วไป";
                subdivision.appendChild(opt);
            }
        }

        // ฟังก์ชันเมื่อเปลี่ยน ประเภทอุปกรณ์ (แสดง/ซ่อน Windows & Antivirus)
        function handleDeviceChange() {
            const deviceType = document.getElementById('device_type').value;
            if (deviceType === 'Printer' || deviceType === 'อื่นๆ') {
                windowsField.classList.add('hidden');
                antivirusField.classList.add('hidden');
                windowsInput.value = "";
                antivirusInput.value = "";
            } else {
                windowsField.classList.remove('hidden');
                antivirusField.classList.remove('hidden');
            }
        }

        let tempSelected = null;

        function initDesks() {
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'desk-btn aspect-square bg-white border-2 border-slate-200 rounded-xl flex flex-col items-center justify-center hover:border-blue-400 hover:bg-blue-50 transition-all group p-2 shadow-sm';
                btn.innerHTML = `
                    <i class="fa-solid fa-computer text-slate-300 group-hover:text-blue-500 text-xl mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-400 group-hover:text-blue-600">โต๊ะ ${i}</span>
                `;
                btn.onclick = () => {
                    document.querySelectorAll('.desk-btn').forEach(b => b.classList.remove('desk-selected'));
                    btn.classList.add('desk-selected');
                    tempSelected = i;
                };
                deskContainer.appendChild(btn);
            }
        }

        function openModal() { modal.classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
        function closeModal() { modal.classList.add('hidden'); document.body.style.overflow = 'auto'; }

        function confirmSelection() {
            if (tempSelected) {
                selectedText.innerText = `โต๊ะหมายเลข ${tempSelected}`;
                selectedText.classList.add('font-bold', 'text-blue-800');
                deskIdInput.value = tempSelected;
                closeModal();
            } else { alert('กรุณาเลือกโต๊ะก่อนกดยืนยัน'); }
        }

        document.getElementById('repairForm').addEventListener('submit', function(e) {
            if(!deskIdInput.value) {
                e.preventDefault();
                alert('กรุณาเลือกตำแหน่งโต๊ะคอมพิวเตอร์ก่อนส่งคำร้อง');
                openModal();
            }
        });

        window.onclick = function(event) { if (event.target == modal) closeModal(); }
        
        initDesks();
    </script>
</body>
</html>
